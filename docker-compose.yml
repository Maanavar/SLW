services:
  postgres:
    image: postgres:16-alpine
    container_name: slw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: slw_local
      POSTGRES_USER: slw_admin
      POSTGRES_PASSWORD: slw_dev_password
    ports:
      - '5432:5432'
    volumes:
      - slw_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U slw_admin -d slw_local']
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: slw-adminer
    restart: unless-stopped
    ports:
      - '8081:8080'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  slw_postgres_data:
