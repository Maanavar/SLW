services:
  postgres:
    image: postgres:16-alpine
    container_name: slw-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: slw_prod
      POSTGRES_USER: slw_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - slw_postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U slw_admin -d slw_prod']
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: slw-backend-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://slw_admin:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/slw_prod?schema=public
      CORS_ORIGIN: ${CORS_ORIGIN:-https://your-domain.example}
      ADMIN_API_KEY: ${ADMIN_API_KEY:?set ADMIN_API_KEY}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:?set AUTH_SESSION_SECRET}
      AUTH_SESSION_HOURS: ${AUTH_SESSION_HOURS:-12}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slw-frontend-prod
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: slw-nginx-prod
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro

volumes:
  slw_postgres_prod_data:
